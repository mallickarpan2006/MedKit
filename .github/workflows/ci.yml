name: MedKit CI

on:
  push:
  pull_request:

permissions:
  contents: read

# The jobs intentionally form one gated conveyor. A failure stops every later
# stage, so a green package is always backed by green quality and contract gates.
jobs:
  checkout:
    name: "01 · Checkout"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Record source revision
        run: git rev-parse --verify HEAD

  frontend:
    name: "02 · Frontend quality"
    needs: checkout
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit and smoke tests
        working-directory: frontend
        run: npm test

  contracts:
    name: "03 · Contract tests"
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Test aid pool
        run: cargo test --manifest-path contracts/pool/Cargo.toml
      - name: Test identity verifier
        run: cargo test --manifest-path contracts/verifier-v26/contracts/identity/Cargo.toml

  build:
    name: "04 · Production build"
    needs: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Build aid pool WASM
        run: cargo build --manifest-path contracts/pool/Cargo.toml --target wasm32v1-none --release
      - name: Build verifier WASM
        run: cargo build --manifest-path contracts/verifier-v26/Cargo.toml --target wasm32v1-none --release --package rs-soroban-ultrahonk
      - name: Build identity WASM
        run: cargo build --manifest-path contracts/verifier-v26/contracts/identity/Cargo.toml --target wasm32v1-none --release
      - name: Stage release files
        run: |
          mkdir -p artifacts/contracts
          cp -R frontend/dist artifacts/frontend-dist
          cp medkit_claim/deployment.json artifacts/deployment.json
          cp contracts/pool/target/wasm32v1-none/release/*.wasm artifacts/contracts/
          cp contracts/verifier-v26/target/wasm32v1-none/release/*.wasm artifacts/contracts/
          cp contracts/verifier-v26/contracts/identity/target/wasm32v1-none/release/*.wasm artifacts/contracts/
          tar -czf artifacts/medkit-contracts-source.tgz contracts/pool contracts/verifier-v26/contracts/identity contracts/verifier-v26/contracts/rs-soroban-ultrahonk
      - uses: actions/upload-artifact@v4
        with:
          name: medkit-build-${{ github.sha }}
          path: artifacts
          if-no-files-found: error

  package:
    name: "05 · Release package"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: medkit-build-${{ github.sha }}
          path: release
      - name: Verify release package
        run: |
          test -s release/deployment.json
          test -d release/frontend-dist
          test -n "$(find release/contracts -name '*.wasm' -print -quit)"
          test -s release/medkit-contracts-source.tgz
          echo "Release package is complete and ready for protected deployment."
